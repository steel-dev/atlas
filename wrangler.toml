name = "atlas"
main = "src/index.ts"
compatibility_date = "2025-01-22"
compatibility_flags = ["nodejs_compat"]
# Durable Object — one instance per async job (job_id keyed via idFromName)
[[durable_objects.bindings]]
name = "ATLAS_JOB"
class_name = "AtlasJob"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AtlasJob"]

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "atlas-artifacts"

# --- Secrets (set via `wrangler secret put <NAME>`) ---
#   STEEL_API_KEY          Steel Cloud API key
#   ANTHROPIC_API_KEY      Anthropic API key (BYO LLM)
#
# --- Optional vars ---
#   STEEL_BASE_URL         Override Steel endpoint (self-hosted Steel)
