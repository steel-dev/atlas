<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>atlas</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: #101014; color: #e8e8ea;
        font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
      }
      main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
      h1 { font-size: 18px; margin: 0 0 16px; }
      form { display: flex; gap: 8px; margin-bottom: 20px; }
      input[type="text"] {
        flex: 1; padding: 10px 12px; border-radius: 8px;
        border: 1px solid #2c2c33; background: #18181d; color: inherit;
      }
      select, button {
        padding: 10px 14px; border-radius: 8px; border: 1px solid #2c2c33;
        background: #18181d; color: inherit; cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 800px) { .cols { grid-template-columns: 1fr; } }
      .panel {
        border: 1px solid #2c2c33; border-radius: 10px; background: #131318;
        padding: 12px; min-height: 200px; max-height: 75vh; overflow: auto;
      }
      .panel h2 {
        font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
        color: #8a8a93; margin: 0 0 8px;
      }
      #log { font: 12px/1.5 ui-monospace, monospace; white-space: pre-wrap; }
      #log .warn { color: #e8c468; }
      #log .ok { color: #6fcf97; }
      #log .dim { color: #8a8a93; }
      #report { white-space: pre-wrap; font-size: 13px; }
      #stats { margin-top: 10px; color: #8a8a93; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <h1>atlas — deep research</h1>
      <form id="form">
        <input id="question" type="text" placeholder="Ask a research question…" autofocus />
        <select id="effort">
          <option value="fast">fast</option>
          <option value="balanced" selected>balanced</option>
          <option value="deep">deep</option>
          <option value="max">max</option>
        </select>
        <button id="go" type="submit">Research</button>
      </form>
      <div class="cols">
        <section class="panel"><h2>Progress</h2><div id="log"></div></section>
        <section class="panel">
          <h2>Report</h2>
          <div id="report"></div>
          <div id="stats"></div>
        </section>
      </div>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const log = $("log"), report = $("report"), stats = $("stats");

      function line(text, cls) {
        const div = document.createElement("div");
        div.textContent = text;
        if (cls) div.className = cls;
        log.appendChild(div);
        log.parentElement.scrollTop = log.parentElement.scrollHeight;
      }

      function describe(e) {
        switch (e.type) {
          case "run.started":
            return [`run ${e.runId} — ${e.effort}, $${e.budgetUSD.toFixed(2)} budget`, "dim"];
          case "plan.updated":
            return [`plan: ${e.rationale}`, "dim"];
          case "agent.spawned":
            return [`+ ${e.role}: ${e.task} ($${e.grantUSD.toFixed(2)})`, "dim"];
          case "agent.returned":
            return [`- ${e.role}: ${e.claimsAdded} claims, $${e.spentUSD.toFixed(2)} (${e.stopReason})`, "dim"];
          case "search.completed":
            return [`search: ${e.query} → ${e.results} via ${e.provider}`, "dim"];
          case "search.failed":
            return [`! search failed: ${e.query} — ${e.error}`, "warn"];
          case "source.fetched":
            return [`✓ ${e.url} (${e.via}, ${e.chars} chars)`, "ok"];
          case "source.failed":
            return [`! ${e.url} — ${e.reason}`, "warn"];
          case "extraction.completed":
            return [`  ↳ ${e.count} claims from ${e.url}`, "dim"];
          case "claim.verified":
            return [`${e.status === "confirmed" ? "✓" : "✗"} claim ${e.claimId} ${e.status}`, e.status === "confirmed" ? "ok" : "warn"];
          case "report.drafting":
            return ["drafting report…", "dim"];
          case "budget.warning":
            return [`! budget ${Math.round(e.fraction * 100)}% — $${e.spentUSD.toFixed(2)} of $${e.limitUSD.toFixed(2)}`, "warn"];
          case "safety.flag":
            return [`! safety ${e.kind}: ${e.detail}`, "warn"];
          case "pricing.missing":
            return [`! ${e.detail}`, "warn"];
          case "rate.limited":
            return [`! rate limited — waiting ${e.retryAfterSeconds}s`, "warn"];
          case "run.error":
            return [`! error: ${e.message}`, "warn"];
          case "run.completed":
            return ["✓ run completed", "ok"];
          default:
            return null;
        }
      }

      function finish(result) {
        report.textContent = result.report;
        const s = result.stats;
        stats.textContent =
          `$${s.costUSD.toFixed(4)} · ${result.sources.length} sources · ` +
          `${s.claimsConfirmed} confirmed / ${s.claimsContested} contested / ${s.claimsRefuted} refuted · ` +
          `${s.agentsSpawned} agents · ${(s.durationMs / 1000).toFixed(0)}s`;
      }

      async function research(question, effort) {
        const res = await fetch("/research", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, effort }),
        });
        if (!res.ok || !res.body) {
          const body = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status} ${body}`);
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        for (;;) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buffer.indexOf("\n\n")) >= 0) {
            const chunk = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            const data = chunk.split("\n")
              .filter((l) => l.startsWith("data: "))
              .map((l) => l.slice(6))
              .join("\n");
            if (!data) continue;
            const event = JSON.parse(data);
            if (event.type === "report.delta") {
              report.textContent += event.text;
            } else if (event.type === "result") {
              finish(event.result);
            } else {
              const out = describe(event);
              if (out) line(out[0], out[1]);
            }
          }
        }
      }

      $("form").addEventListener("submit", async (ev) => {
        ev.preventDefault();
        const question = $("question").value.trim();
        if (!question) return;
        $("go").disabled = true;
        log.textContent = "";
        report.textContent = "";
        stats.textContent = "";
        try {
          await research(question, $("effort").value);
        } catch (err) {
          line(`! ${err && err.message ? err.message : err}`, "warn");
        } finally {
          $("go").disabled = false;
        }
      });
    </script>
  </body>
</html>
