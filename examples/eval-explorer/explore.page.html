<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DRACO Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color: #ededed;
        background: #000;
        font-family: "Geist Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; background: #000; }
      button, select { font: inherit; }
      button:not(:disabled) { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.52; }
      button:focus-visible, select:focus-visible { outline: 1px solid #ededed; outline-offset: 2px; }
      ::selection { background: #1f3a2c; }
      a { color: #3ecf8e; text-decoration: none; }
      .app { width: min(1280px, calc(100vw - 32px)); margin: 0 auto; padding: 18px 0 64px; }

      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; height: 48px; margin-bottom: 12px; border-bottom: 1px solid #1f1f1f; flex-wrap: wrap; }
      .brand { display: flex; align-items: baseline; gap: 9px; }
      .brand b { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
      .brand span { color: #888; font-size: 12px; }
      .topright { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

      select.commit { border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 10px; color: #ededed; background: #0a0a0a; font-size: 12px; max-width: 420px; }
      .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 10px; font-size: 11px; border: 1px solid #2a2a2a; color: #9a9a9a; background: #080808; }
      .pill.dirty { border-color: #5c4a1e; color: #f5a524; background: #181206; }
      .pill.warn { border-color: #5b2b2b; color: #ff9b95; background: #1a0f10; }

      .btn { display: inline-flex; align-items: center; gap: 8px; border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 11px; color: #d4d4d4; background: #0a0a0a; font-size: 12px; white-space: nowrap; transition: border-color 120ms ease, background 120ms ease, color 120ms ease; }
      .btn:not(:disabled):hover { border-color: #3a3a3a; color: #fff; background: #111; }
      .btn.primary { border-color: #fff; color: #000; background: #fff; }
      .btn.primary:not(:disabled):hover { background: #dcdcdc; }
      .btn.sm { padding: 5px 9px; font-size: 11px; }

      .statusLabel { display: inline-flex; align-items: center; gap: 7px; color: #d4d4d4; font-size: 11px; }
      .dot { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 999px; background: #777; }
      .dot.live { background: #3ecf8e; animation: pulse 1.2s infinite; }
      .dot.ok { background: #3ecf8e; }
      .dot.warn { background: #f5a524; }
      .dot.err { background: #ff6b6b; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

      .summary { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; padding: 12px 0; color: #888; font-size: 12px; }
      .summary .big { color: #fff; font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
      .summary .kv b { color: #d4d4d4; }
      .summary .sep { color: #2a2a2a; }
      .profileLine { color: #525252; font-size: 11px; }

      .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin: 6px 0 14px; }
      .toolbar .grow { flex: 1; }
      .toolbar select, .toolbar input { border: 1px solid #242424; border-radius: 6px; padding: 6px 9px; color: #ededed; background: #050505; font-size: 12px; }
      .chiprow { display: inline-flex; gap: 4px; }
      .schip { border: 1px solid #1f1f1f; border-radius: 999px; padding: 4px 10px; color: #9a9a9a; background: #080808; font-size: 11px; }
      .schip.on { border-color: #3ecf8e; color: #3ecf8e; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(212px, 1fr)); gap: 8px; }
      .cell { position: relative; display: flex; flex-direction: column; gap: 5px; border: 1px solid #242424; border-radius: 9px; padding: 9px 11px 10px 15px; background: #050505; cursor: pointer; min-height: 100px; overflow: hidden; transition: border-color 120ms ease; }
      .cell:hover { border-color: #3a3a3a; }
      .cell .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #1f1f1f; }
      .cellTop { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
      .cell .dom { min-width: 0; color: #8a8a8a; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.04em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cell .cid { color: #3f3f3f; }
      .cell .score { flex: 0 0 auto; font-size: 15px; font-weight: 700; }
      .cell .prob { color: #cbcbcb; font-size: 11.5px; line-height: 1.42; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .cell .sub { margin-top: auto; color: #525252; font-size: 10px; }
      .cell .badge { flex: 0 0 auto; font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
      .badge.queued { color: #f5a524; border: 1px solid #5c4a1e; }
      .badge.running { color: #3ecf8e; border: 1px solid #1f3a2c; animation: pulse 1.2s infinite; }

      .detailWrap { display: none; }
      .detailWrap.on { display: block; }
      .gridWrap.off { display: none; }
      .dHead { position: relative; padding: 4px 0 14px; border-bottom: 1px solid #1f1f1f; }
      .dHead .cat { margin: 10px 0 0; color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
      .dHead .caseref { margin-top: 3px; color: #525252; font-size: 11px; }
      .dHead .desc { margin: 11px 0 0; color: #9a9a9a; font-size: 12.5px; line-height: 1.6; }
      .dHead .meta { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; color: #888; font-size: 12px; }
      .dHead .meta b { color: #d4d4d4; }
      .dActions { position: absolute; top: 4px; right: 0; display: flex; gap: 8px; }

      .split { display: grid; grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr); gap: 14px; margin-top: 14px; align-items: start; }
      .panel { border: 1px solid #242424; border-radius: 10px; background: #050505; overflow: hidden; }
      .panelHead { display: flex; align-items: center; justify-content: space-between; height: 38px; border-bottom: 1px solid #1f1f1f; padding: 0 14px; color: #888; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
      .rubric { max-height: 76vh; overflow: auto; }
      .sec { border-top: 1px solid #161616; }
      .sec:first-child { border-top: 0; }
      .secHead { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 14px; background: #0a0a0a; border-bottom: 1px solid #161616; }
      .secHead .t { color: #ededed; font-size: 12px; font-weight: 600; }
      .secHead .s { color: #888; font-size: 11px; }
      .crit { display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 9px; padding: 9px 14px; border-top: 1px solid #111; cursor: pointer; }
      .crit:hover { background: #080808; }
      .vdot { margin-top: 3px; width: 8px; height: 8px; border-radius: 999px; }
      .vdot.met { background: #3ecf8e; }
      .vdot.unmet { background: #ff6b6b; }
      .vdot.none { background: #3a3a3a; }
      .crit .req { color: #cfcfcf; font-size: 12px; line-height: 1.5; }
      .crit .wt { color: #525252; font-size: 10.5px; }
      .crit .wt.neg { color: #f5a524; }
      .crit .reason { margin-top: 5px; color: #8a8a8a; font-size: 11px; line-height: 1.55; display: none; }
      .crit.open .reason { display: block; }

      .reportBody { padding: 26px 30px 32px; max-height: 76vh; overflow: auto; }
      .reportBody.empty { display: grid; place-items: center; min-height: 200px; color: #5a5a5a; font-size: 12.5px; text-align: center; }
      .report { color: #cfcfcf; font-size: 13px; line-height: 1.82; }
      .report > :first-child { margin-top: 0; }
      .report h1 { color: #fff; font-size: 21px; letter-spacing: -0.03em; line-height: 1.2; margin: 0 0 15px; }
      .report h2 { color: #ededed; font-size: 15px; letter-spacing: -0.02em; margin: 26px 0 9px; }
      .report h3 { color: #ededed; font-size: 13px; margin: 18px 0 7px; }
      .report p { margin: 0 0 12px; }
      .report ul, .report ol { margin: 0 0 12px; padding-left: 20px; }
      .report li { margin: 4px 0; }
      .report a { border-bottom: 1px solid rgba(62, 207, 142, 0.3); }
      .report a:hover { border-bottom-color: #3ecf8e; }
      .report code { background: #0d0d0d; border: 1px solid #1f1f1f; padding: 1px 5px; border-radius: 4px; color: #ededed; font-size: 0.9em; }
      .report pre { margin: 0 0 12px; padding: 13px 15px; border: 1px solid #1f1f1f; border-radius: 8px; background: #000; overflow: auto; }
      .report blockquote { margin: 0 0 12px; padding: 2px 14px; border-left: 2px solid #2a2a2a; color: #9a9a9a; }

      .live { border: 1px solid #1f3a2c; border-radius: 10px; background: #060a08; margin-top: 14px; overflow: hidden; }
      .liveHead { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #11241a; }
      .liveHead .ph { color: #3ecf8e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      .liveBody { padding: 10px 14px 14px; display: grid; gap: 10px; }
      .counters { display: flex; flex-wrap: wrap; gap: 16px; color: #888; font-size: 12px; }
      .counters b { color: #ededed; }
      .progress { height: 6px; border-radius: 999px; background: #11241a; overflow: hidden; }
      .progress > i { display: block; height: 100%; background: #3ecf8e; width: 0; transition: width 200ms ease; }
      pre.tlog { margin: 0; max-height: 200px; overflow: auto; color: #9a9a9a; font-size: 11px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

      .empty { display: grid; place-items: center; min-height: 320px; color: #5a5a5a; font-size: 13px; text-align: center; padding: 24px; }
      .errBox { border: 1px solid #5b2b2b; border-radius: 8px; background: #1a0f10; color: #ff9b95; padding: 14px 16px; font-size: 12px; line-height: 1.6; }
      @media (max-width: 880px) { .split { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <button class="brand" id="home" style="border:0;background:transparent;padding:0">
          <b>DRACO</b><span>explorer</span>
        </button>
        <div class="topright" id="topright"></div>
      </div>

      <div class="gridWrap" id="gridWrap">
        <div class="summary" id="summary"></div>
        <div class="toolbar" id="toolbar"></div>
        <div id="gridHost"></div>
      </div>

      <div class="detailWrap" id="detailWrap"></div>
    </div>

    <script type="module" src="/client.js"></script>
  </body>
</html>
